# Ankshaastra — Supabase CLI configuration
# Docs: https://supabase.com/docs/guides/cli/config
#
# API keys are NOT stored in this file. Copy them from the Supabase Dashboard
# (Project Settings → API) into your root `.env` / Vercel env vars — see `.env.example`.
#
# | Dashboard field          | Frontend (.env)              | Server (Vercel only)        |
# |--------------------------|------------------------------|-----------------------------|
# | Project URL              | VITE_SUPABASE_URL            | SUPABASE_URL                |
# | anon / public key        | VITE_SUPABASE_PUBLISHABLE_KEY| —                           |
# | service_role / secret    | — (never expose)             | SUPABASE_SERVICE_ROLE_KEY   |
# | Reference ID             | VITE_SUPABASE_PROJECT_ID     | —                           |

# ── Link to remote project (Dashboard → General → Reference ID) ──
project_id = "iiihikzsewdyhgmpsyaj"

# ── API (local `supabase start` only) ──
[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

# ── Database (local dev) ──
[db]
port = 54322
shadow_port = 54320
major_version = 15

# ── Studio (local DB UI) ──
[studio]
enabled = true
port = 54323
api_url = "/api"

# ── Auth ──
[auth]
enabled = true
# Production site URL (e.g. https://ankshaastra.com) — required for email links & OAuth
site_url = "https://ankshaastra.com"
# Add every URL users can return to after sign-in / email confirm (local + production)
additional_redirect_urls = []
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false
double_confirm_changes = true

# ── Storage (invoice PDFs bucket: create `invoices` in Dashboard if not migrated) ──
[storage]
enabled = true
file_size_limit = "50MiB"

# ── Edge Functions (optional) ──
[edge_runtime]
enabled = false

# ── Analytics (optional) ──
[analytics]
enabled = false
